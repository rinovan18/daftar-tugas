<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <title>Explode Quiz - Google Apps Script</title>
  <style>
    body {
      font-family: var(--ddd-font-primary);
      margin: 0;
      padding: 20px;
      max-width: 640px;
      margin: 0 auto;
    }
    .quiz-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .quiz-instruction {
      margin-bottom: 20px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1 class="quiz-title">Kuis Interaktif</h1>
  <p class="quiz-instruction">Masukkan nama Anda untuk memulai kuis. Hasil akan otomatis tersimpan ke Google Sheets.</p>
  
  <explode-quiz></explode-quiz>

  <!-- Import komponen explode-quiz -->
  <script type="module">
    // Load explode-quiz dari CDN atau local
    // Gunakan CDN jsDelivr untuk prod atau upload ke Google Drive untuk internal
    import "https://cdn.jsdelivr.net/gh/haxtheweb/webcomponents/elements/explode/explode-quiz.js";
    
    // Atau gunakan local copy (jika di-upload ke Google Drive):
    // import "./explode-quiz.js";
    
    console.log('Explode Quiz component loaded');
  </script>

  <!-- Google Apps Script API -->
  <script src="https://apis.google.com/js/api.js"></script>
  <script>
    // Inisialisasi Google API
    gapi.load('client', function() {
      console.log('Google API loaded');
    });
  </script>
</body>
</html>
