<!DOCTYPE html>
<html>
<head>
  <base href="https://your-site.com/" />
  <script type="importmap">
    {
      "scopes": {
        "./": {
          "@haxtheweb/": "./"
        }
      }
    }
  </script>
  <meta charset="utf-8">
  <title>Explode Quiz - Google Apps Script</title>
  <style>
    body {
      font-family: var(--ddd-font-primary);
      margin: 20px;
      max-width: 640px;
    }
  </style>
</head>
<body>
  <h1>Kuis Interaktif</h1>
  <p>Gunakan form ini untuk mengikuti kuis. Hasil akan otomatis tersimpan ke Google Sheets.</p>
  
  <explode-quiz></explode-quiz>

  <script type="module">
    // Import komponen explode-quiz dari CDN atau local
    import "./explode-quiz.js";
    
    // Simpan referensi ke komponen untuk debugging
    window.explodeQuiz = document.querySelector('explode-quiz');
    
    console.log('Explode Quiz component loaded');
  </script>

  <!-- Apps Script runtime -->
  <script src="https://apis.google.com/js/api.js"></script>
</body>
</html>
